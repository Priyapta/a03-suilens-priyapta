apiVersion: v1
kind: Namespace
metadata:
  name: suilens-2306245106

---
# ==========================================
# 1. RABBITMQ (Message Broker)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: suilens-2306245106
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: suilens-2306245106
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
# ==========================================
# 2. CATALOG SERVICE & DATABASE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: suilens-2306245106
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: catalog-db
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: catalog
            - name: POSTGRES_PASSWORD
              value: catalog
            - name: POSTGRES_DB
              value: catalog
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U catalog -d catalog
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: suilens-2306245106
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2306245106
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      initContainers:
        - name: wait-for-catalog-db
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              value: catalog
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for catalog-db..."
              until pg_isready -h catalog-db -p 5432 -U catalog -d catalog; do sleep 2; done
              echo "✅ catalog-db ready!"
        - name: migrate-catalog-db
          image: docker.io/priyapta/suilens-catalog-service:latest
          command:
            - sh
            - -c
            - bunx drizzle-kit push
          env:
            - name: DATABASE_URL
              value: postgres://catalog:catalog@catalog-db:5432/catalog
      containers:
        - name: catalog-service
          image: docker.io/priyapta/suilens-catalog-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://catalog:catalog@catalog-db:5432/catalog
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2306245106
spec:
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service-nodeport
  namespace: suilens-2306245106
spec:
  type: NodePort
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001

---
# ==========================================
# 3. ORDER SERVICE & DATABASE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: suilens-2306245106
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: order-db
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: orders
            - name: POSTGRES_PASSWORD
              value: orders
            - name: POSTGRES_DB
              value: orders
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -h localhost -U orders -d orders
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: suilens-2306245106
spec:
  selector:
    app: order-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-2306245106
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
        - name: wait-for-order-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for order-db..."
              until pg_isready -d "postgres://orders:orders@order-db:5432/orders"; do sleep 2; done
              echo "✅ order-db ready!"
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for rabbitmq..."
              until nc -z rabbitmq 5672; do sleep 2; done
              echo "✅ rabbitmq ready!"
        - name: migrate-order-db
          image: docker.io/priyapta/suilens-order-service:latest
          command:
            - sh
            - -c
            - bunx drizzle-kit push
          env:
            - name: DATABASE_URL
              value: postgres://orders:orders@order-db:5432/orders
      containers:
        - name: order-service
          image: docker.io/priyapta/suilens-order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              value: postgres://orders:orders@order-db:5432/orders
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3001
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-2306245106
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: order-service-nodeport
  namespace: suilens-2306245106
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002

---
