              echo "✅ notification-db ready!"
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for rabbitmq..."
              until nc -z rabbitmq 5672; do sleep 2; done
              echo "✅ rabbitmq ready!"
        - name: migrate-notification-db
          image: docker.io/priyapta/suilens-notification-service:latest
          command:
            - sh
            - -c
