  namespace: suilens-2306245106
spec:
  type: NodePort
  selector:
    app: notification-service
  ports:
    - port: 3003
      targetPort: 3003
      nodePort: 30003

---
# ==========================================
# 5. FRONTEND
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: suilens-2306245106
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/priyapta/suilens-frontend:latest # Sesuaikan jika nama image kamu berbeda
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
          env:
            - name: VITE_CATALOG_API
              value: http://catalog-service:3001
            - name: VITE_ORDER_API
              value: http://order-service:3002
            - name: VITE_NOTIFICATION_WS_URL
              value: ws://notification-service:3003/ws/notifications
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: suilens-2306245106
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30000
